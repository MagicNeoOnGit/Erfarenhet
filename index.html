<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blob Coin Dash</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="game-shell">
    <section class="hud">
      <div>
        <h1>Blob Coin Dash</h1>
        <p>Collect all 10 coins before the blob dies 3 times.</p>
      </div>
      <div class="controls">
        <span>`A` / `D` or arrows to move</span>
        <span>`W`, `Up`, or `Space` to jump</span>
        <span>`S` or `Down` to crouch</span>
        <span>`R` to restart</span>
      </div>
    </section>

    <canvas id="game" width="960" height="540" aria-label="Platformer game"></canvas>

    <section class="legend">
      <span><strong>Blob:</strong> you</span>
      <span><strong>Gold circles:</strong> coins</span>
      <span><strong>Pink spikes:</strong> instant death</span>
    </section>

    <section class="settings" aria-label="Volume settings">
      <h2>Volume</h2>
      <label>
        <span>Music</span>
        <input type="range" id="music-volume" min="0" max="100" value="100" />
      </label>
      <label>
        <span>Sound effects</span>
        <input type="range" id="sfx-volume" min="0" max="100" value="100" />
      </label>
    </section>

    <section class="settings" aria-label="Theme">
      <h2>Theme</h2>
      <div class="theme-buttons">
        <button type="button" id="theme-normal" aria-pressed="true">Normal</button>
        <button type="button" id="theme-orange">GS</button>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
